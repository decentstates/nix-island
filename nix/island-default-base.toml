# Default base Landlock configuration generated by `island create`
# (nix-holm variant for Nix systems, replacing the upstream FHS default;
# embedded in the island binary and shipped verbatim in every holm).
# Do not edit in place — add sibling files, which COMPOSE: grants union,
# handled accesses intersect; tightening needs a second profile (-p a -p b).

abi = 6

# Deny every handled access by default.
[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# System executables. Also covers /bin/sh, /usr/bin/env, and
# /run/current-system/* shebangs: Landlock checks the store object a
# path RESOLVES to. /run/wrappers (setuid) deliberately excluded.
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = [
    "/nix/store",
]

# Safe writable devices.
[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "/dev/full",
    "/dev/null",
    "/dev/random",
    "/dev/urandom",
    "/dev/zero",
]

# System configuration and introspection files.
[[path_beneath]]
allowed_access = [
    "read_dir",
    "read_file",
    "refer",
]
parent = [
    "/etc",
    "/proc/self",
    "/proc/cpuinfo",
]
