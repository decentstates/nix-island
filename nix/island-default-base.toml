# Default base Landlock configuration generated by `island create`
# (nix-holm variant for Nix systems, replacing the upstream FHS default).
#
# This file should not be modified directly but copied in a new sibling file and
# updated according to programs' and users' needs.  In sibling files, the abi
# variable and the [[ruleset]] section should at least be a subset of the ones
# defined here to not lose the default protections for compatibility reasons.
#
# It is embedded into the island binary at build time and shipped verbatim
# in every nix-holm profile. Files within a profile COMPOSE: grants union,
# handled access rights intersect — sibling files can add grants, and
# genuine tightening requires stacking a second profile (`-p a -p b`).

abi = 6

# Deny every handled access by default.
[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# System executables. On Nix systems everything lives in the store; this
# also covers /bin/sh, /usr/bin/env, and /run/current-system/* shebang
# plumbing, because those are symlinks and Landlock checks the store
# object a path RESOLVES to. /run/wrappers (setuid) is deliberately
# not included.
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = [
    "/nix/store",
]

# Safe writable devices.
[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "/dev/full",
    "/dev/null",
    "/dev/random",
    "/dev/urandom",
    "/dev/zero",
]

# System configuration and introspection files.
[[path_beneath]]
allowed_access = [
    "read_dir",
    "read_file",
    "refer",
]
parent = [
    "/etc",
    "/proc/self",
    "/proc/cpuinfo",
]
